<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>iamalwayshungry™ / no.7 — rebuilt</title>
<meta name="description" content="IAAH v7 (2008–2009), the draggable-canvas portfolio, rebuilt faithfully from the decompiled original engine (dragable.swf).">
<link rel="stylesheet" href="/css/main.css?v=dev">
</head>
<body>

	<h1 class="sr-only">iamalwayshungry — no.7, rebuilt</h1>

	<main id="stage" aria-label="Draggable canvas">
		<div id="plane"></div>
	</main>

	<div id="hint" aria-hidden="true">Hold down mouse and drag to navigate</div>

	<button id="tab-prev" class="edge-tab" aria-label="Previous slide">
		<span class="ins"><span class="dir">Prev</span><span class="count"></span></span>
	</button>
	<button id="tab-next" class="edge-tab" aria-label="Next slide">
		<span class="ins"><span class="dir">Next</span><span class="count"></span></span>
	</button>

	<div id="loadbar" aria-hidden="true"></div>

	<div id="scrim" aria-hidden="true"></div>
	<nav id="menu" aria-label="Projects" hidden>
		<div id="menu-col"></div>
	</nav>

	<button id="logo" aria-label="Open menu">
		<img src="/assets/logo.png" alt="iamalwayshungry">
	</button>

	<script type="module" src="/js/app.js?v=dev"></script>
</body>
</html>
